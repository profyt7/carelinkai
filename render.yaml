services:
  - type: web
    name: carelinkai
    runtime: node
    region: oregon
    plan: starter
    buildCommand: bash render-build-verbose.sh
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20.11.0"
      - key: NODE_ENV
        value: production
    healthCheckPath: /


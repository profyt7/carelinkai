name: Production Smoke Test

on:
  workflow_dispatch:
  schedule:
    # Nightly at 06:00 UTC
    - cron: '0 6 * * *'
  # Triggered manually after each production deploy via repository_dispatch
  repository_dispatch:
    types: [production-deploy]

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke — ${{ matrix.check }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        check: [health, email-delivery, s3-roundtrip, stripe-products]

    steps:
      - name: Health check
        if: matrix.check == 'health'
        run: |
          RESP=$(curl -sf --max-time 15 https://getcarelinkai.com/api/health)
          echo "Response: $RESP"
          echo "$RESP" | jq -e '.ok == true' || (echo "FAIL: health endpoint not ok" && exit 1)
          echo "$RESP" | jq -e '.db == "ok"' || (echo "FAIL: DB not ok" && exit 1)
          echo "Health check passed."

      - name: Email delivery (Resend API polling)
        if: matrix.check == 'email-delivery'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_SMOKE_TO: ${{ secrets.RESEND_SMOKE_EMAIL }}
        run: |
          set -e
          # Send a test email via Resend API
          SEND_RESP=$(curl -sf -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"from\":\"smoke@mail.getcarelinkai.com\",\"to\":[\"$RESEND_SMOKE_TO\"],\"subject\":\"CareLinkAI smoke test $(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"text\":\"Smoke test email — automated.\"}")
          EMAIL_ID=$(echo "$SEND_RESP" | jq -r '.id')
          echo "Sent email id: $EMAIL_ID"
          if [ -z "$EMAIL_ID" ] || [ "$EMAIL_ID" = "null" ]; then
            echo "FAIL: Resend did not return an email ID"
            exit 1
          fi
          # Poll until delivered or timeout (max 60 seconds)
          for i in $(seq 1 12); do
            sleep 5
            STATUS=$(curl -sf -H "Authorization: Bearer $RESEND_API_KEY" "https://api.resend.com/emails/$EMAIL_ID" | jq -r '.last_event // .status // "unknown"')
            echo "Attempt $i: status=$STATUS"
            if [ "$STATUS" = "delivered" ] || [ "$STATUS" = "opened" ]; then
              echo "Email delivered."
              exit 0
            fi
          done
          echo "FAIL: Email not delivered within 60 seconds (last status: $STATUS)"
          exit 1

      - name: S3 round-trip
        if: matrix.check == 's3-roundtrip'
        env:
          HEALTH_CHECK_TOKEN: ${{ secrets.HEALTH_CHECK_TOKEN }}
        run: |
          RESP=$(curl -sf --max-time 30 \
            -H "x-health-check-token: $HEALTH_CHECK_TOKEN" \
            https://getcarelinkai.com/api/health/s3)
          echo "Response: $RESP"
          echo "$RESP" | jq -e '.ok == true' || (echo "FAIL: S3 round-trip failed" && exit 1)
          echo "S3 round-trip passed."

      - name: Stripe products reachable
        if: matrix.check == 'stripe-products'
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY_TEST }}
        run: |
          RESP=$(curl -sf --max-time 15 \
            -u "$STRIPE_SECRET_KEY:" \
            "https://api.stripe.com/v1/products?limit=3")
          echo "$RESP" | jq -e '.data | length >= 0' || (echo "FAIL: Stripe products API error" && exit 1)
          echo "Stripe products check passed."

  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: smoke
    if: failure()
    steps:
      - name: Slack alert
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_SMOKE_WEBHOOK }}
        run: |
          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d "{\"text\":\":red_circle: *Production smoke test FAILED* — <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"}"

      - name: Sentry issue
        if: env.SENTRY_DSN != ''
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          curl -sf -X POST "$SENTRY_DSN" \
            -H 'Content-Type: application/json' \
            -d "{\"exception\":{\"values\":[{\"type\":\"SmokeTestFailure\",\"value\":\"Production smoke test failed — run ${{ github.run_id }}\"}]},\"level\":\"error\",\"tags\":{\"source\":\"smoke-test\"}}" || true
